<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kampanya Radarı — Hesap Bağlantısı</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0B0F0D; color: #EAEAEA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 420px; width: 100%; text-align: center;
      background: #121A16; border: 1px solid rgba(22,199,132,0.25);
      border-radius: 20px; padding: 36px 28px;
    }
    .brand { color: #16C784; font-size: 22px; font-weight: 800; margin: 0 0 2px; }
    .tagline { color: #7d8a83; font-size: 13px; margin: 0 0 26px; }
    .check {
      width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 50%;
      background: rgba(22,199,132,0.15); display: flex; align-items: center; justify-content: center;
      font-size: 38px; color: #16C784;
    }
    h1 { font-size: 22px; margin: 0 0 12px; }
    p { font-size: 15px; line-height: 1.55; color: #b9c2bd; margin: 0 0 24px; }
    .btn {
      display: inline-block; background: #16C784; color: #07140E; text-decoration: none;
      font-weight: 700; font-size: 15px; padding: 14px 30px; border-radius: 12px;
    }
    .small { font-size: 12px; color: #6b7771; margin-top: 22px; }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Kampanya Radarı</p>
    <p class="tagline">Banka & kart kampanyaları tek ekranda</p>
    <div class="check">✓</div>
    <h1 id="title">E-postan doğrulandı!</h1>
    <p id="message">Hesabın başarıyla etkinleştirildi. Artık <strong>Kampanya Radarı</strong> uygulamasına dönüp giriş yapabilirsin.</p>
    <a id="open-app" class="btn" href="kampanyaradari://auth-callback">Uygulamayı Aç</a>
    <p id="hint" class="small">Bu sayfayı kapatıp uygulamadan da giriş yapabilirsin.</p>
  </div>
  <script>
    (function () {
      var hash = window.location.hash || "";
      var search = window.location.search || "";
      var rawParams = hash ? hash.slice(1) : search.slice(1);
      var params = new URLSearchParams(rawParams);
      var type = params.get("type");
      var hasAccessToken = params.has("access_token") || params.has("token");
      var isRecovery = type === "recovery" || (!type && hasAccessToken);
      var openApp = document.getElementById("open-app");
      var title = document.getElementById("title");
      var message = document.getElementById("message");
      var hint = document.getElementById("hint");

      if (isRecovery && !type) {
        params.set("type", "recovery");
      }

      if (isRecovery) {
        var prefix = hash ? "#" : "?";
        openApp.href = "kampanyaradari://auth-callback" + prefix + params.toString();
      } else if (type === "signup") {
        openApp.href = "kampanyaradari://auth-callback?type=signup";
      }

      if (isRecovery) {
        document.title = "Kampanya Radarı — Şifre Sıfırlama";
        title.textContent = "Şifre sıfırlama bağlantısı hazır";
        message.innerHTML = "Yeni şifreni belirlemek için <strong>Kampanya Radarı</strong> uygulamasına dön.";
        hint.textContent = "Uygulama açılmazsa bu sayfayı kapatıp maildeki bağlantıyı tekrar deneyebilirsin.";
      } else if (type === "signup") {
        document.title = "Kampanya Radarı — E-posta Doğrulandı";
      }
    }());
  </script>
</body>
</html>
